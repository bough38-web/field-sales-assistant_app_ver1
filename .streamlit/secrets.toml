# [REQUIRED] Google Spreadsheet Connection Configuration
# Documentation: https://docs.streamlit.io/develop/api-reference/connections/st.connection

drive_folder_id = "" # Folder ID for image storage

[connections.gsheets]
# 1. 활동이력 (Sheet 2) - 로그 및 보고서 저장용 (Primary Sync Target)
spreadsheet = "https://docs.google.com/spreadsheets/d/1xxu8sM1pfyYhJcBraypsqs06q3ZQLluxWsBqS8QbvUs/edit"

# 2. 주소현행화 (Sheet 1) - 지사/담당자 매칭 기준 데이터 (District Master)
address_master_sheet = "https://docs.google.com/spreadsheets/d/18u0yEyw4XTKcZ2ITMgQWlebMKOQotkxZ/edit"

# 3. API 설정 (Sheet 3) - 공공데이터 API 호출 경로 관리 (API Config)
api_config_sheet = "https://docs.google.com/spreadsheets/d/1Y6n4OgetzmvJZBcq75oZRiriMWFSIh3L/edit"

# Service Account Credentials (JSON contents)
type = "service_account"
project_id = ""
private_key_id = ""
private_key = "" # [Paste the Service Account private_key here]
client_email = ""
client_id = ""
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = ""
