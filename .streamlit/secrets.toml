# [REQUIRED] Google Spreadsheet Connection Configuration
# Fill this in to enable cloud synchronization for activity logs and status.
# Documentation: https://docs.streamlit.io/develop/api-reference/connections/st.connection

drive_folder_id = "" # Folder ID for image storage (Service Account needs 'Editor' permission)

[connections.gsheets]
spreadsheet = "" # [Paste Your Google Sheet URL here]
type = "service_account"
project_id = ""
private_key_id = ""
private_key = "" # [Paste the Service Account private_key here, replacing \n with actual newlines or leaving literal \n]
client_email = ""
client_id = ""
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = ""
